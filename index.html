<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <meta name="rnbo-version" content="1.0.0-alpha.5">
    <link rel="stylesheet" href="Style/style.css"/>
    <title>MurrayRobertson\\Composer\\Mooring2</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.js"></script>
</head>
<body>
    <div id="top-bar">
        <div id="loadingGUI">
            <p id="loading-text" class="loadingGUIItem"></p>
            <p id="label-text" class="loadingGUIItem"></p>
            <p id="aux-text" class="loadingGUIItem"></p>
        </div>
        <p id="content-warning" style="color: #fafafa; text-align: right; font-size: 6pt; padding-right: 30px;">© 2026 Murray Robertson.</p>
        <div id="title-and-exit">
            <h1 id="title">Mooring2</h1>
            <a id="exit" href="">exit</a>
            
        </div>
    </div>
    
    <div id="main" class="main">
        <div id="waveforms" class="wrapper-horiz">
            <!--columns each go here-->
            <div id="column1" class="waveform-column">
                <label id="drop-zone-1" class="drop-zone">
                    Drop audio here, or click to upload.
                    <input type="file" id="file-input-1" class="file-input"/>
                </label>
            </div>
            <div id="column2" class="waveform-column">
                <label id="drop-zone-2" class="drop-zone">
                    Drop audio here, or click to upload.
                    <input type="file" id="file-input-2" class="file-input"/>
                </label>
            </div>
            <div id="column3" class="waveform-column">
                <label id="drop-zone-3" class="drop-zone">
                    Drop audio here, or click to upload.
                    <input type="file" id="file-input-3" class="file-input"/>
                </label>
            </div>
        </div>
        <div id="mixer" class="wrapper-horiz">
            <!--mixing faders and then the big toggle go here-->
        </div>
    </div>
</body>
<script type="module" src="Script/script.js"></script>
</html>
